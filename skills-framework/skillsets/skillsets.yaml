      - daily-market-scan

  # ═══════════════════════════════════
  # A股专业套装（专业版）
  # ═══════════════════════════════════
  - id: a-share-pro
    name: A股专业交易套装
    description: 全功能交易套装，含选股、策略信号、风控、决策
    tier: pro
    skills:
      - a-share-market-regime
      - a-share-screener
