# 安幕诺家族 · 小红 🌹 交易系统
# Docker Compose 多服务编排
version: '3.8'

services:
  # ═══════════════════════════════════════
  # 核心交易引擎
  # ═══════════════════════════════════════
  trading-engine:
    build: .
    container_name: xiaohong-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://xiaohong:xiaohong@postgres:5432/xiaohong
      - PAPER_TRADING=${PAPER_TRADING:-true}
      - TRADING_MODE=${TRADING_MODE:-paper}
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - xiaohong-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ═══════════════════════════════════════
  # Cron 调度器（7 角色报告系统）
  # ═══════════════════════════════════════
  cron-scheduler:
    build: .
    container_name: xiaohong-cron
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CRON_MODE=true
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      - redis
      - trading-engine
    networks:
      - xiaohong-net
    command: ["python3", "scripts/auto_executor.py", "--cron"]
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "2"

  # ═══════════════════════════════════════
  # API 服务（FastAPI）
  # ═══════════════════════════════════════
  api-server:
    build: .
    container_name: xiaohong-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://xiaohong:xiaohong@postgres:5432/xiaohong
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - xiaohong-net
    command: ["python3", "scripts/api_server.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ═══════════════════════════════════════
  # Redis — 缓存 + 消息队列
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: xiaohong-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - xiaohong-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  # ═══════════════════════════════════════
  # PostgreSQL — 多租户数据库
  # ═══════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: xiaohong-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=xiaohong
      - POSTGRES_PASSWORD=xiaohong
      - POSTGRES_DB=xiaohong
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - xiaohong-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaohong"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  # ═══════════════════════════════════════
  # Grafana 仪表盘（可选）
  # ═══════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: xiaohong-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./scripts/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./scripts/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - xiaohong-net
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

volumes:
  redis-data:
  postgres-data:
  grafana-data:

networks:
  xiaohong-net:
    driver: bridge
